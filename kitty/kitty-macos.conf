# vim: set foldmarker={{{,}}} foldmethod=marker:

font_size 13

allow_remote_control yes
copy_on_select yes
enable_audio_bell no
tab_bar_edge top

macos_option_as_alt yes

enabled_layouts splits:split_axis=horizontal
map cmd+alt+left neighboring_window left
map cmd+alt+right neighboring_window right
map cmd+alt+up neighboring_window up
map cmd+alt+down neighboring_window down
map cmd+t launch --type tab --location neighbor --cwd=current
map cmd+d launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# BEGIN_KITTY_FONTS
font_family      family='Monaspace Argon' style=Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
font_features MonaspaceArgon-Regular +calt +liga +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +ss09

# BEGIN_KITTY_THEME
# Night Owl
include current-theme.conf
# END_KITTY_THEME
